spring:
  application:
    name: subscriptio-backend

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 16
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/subscriptio}
    username: ${DATABASE_USERNAME:subscriptio}
    password: ${DATABASE_PASSWORD:subscriptio_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 60000

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
