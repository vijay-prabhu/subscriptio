name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn compile -q
      - run: mvn test -Dtest="SubscriptionStateMachineTest,MoneyTest"

  admin-dashboard:
    name: Admin Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  customer-portal:
    name: Customer Portal (Nuxt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: customer-portal/package-lock.json
      - run: npm ci
      - run: npx nuxi@3.14.0 build

  analytics:
    name: Analytics (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install "fastapi>=0.115.0" "uvicorn[standard]>=0.32.0" \
            "sqlalchemy[asyncio]>=2.0.0" "asyncpg>=0.30.0" \
            "pydantic>=2.0.0" "pydantic-settings>=2.0.0" "numpy>=1.26.0" \
            "pytest>=8.0.0" "pytest-asyncio>=0.24.0" "httpx>=0.27.0"
      - run: python -m pytest tests/ -v
