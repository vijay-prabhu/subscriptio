apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: subscriptio
  labels:
    app: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      serviceAccountName: analytics-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: analytics
          image: subscriptio/analytics:latest
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: ANALYTICS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: subscriptio-secrets
                  key: analytics-database-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
