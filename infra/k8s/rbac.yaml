apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: subscriptio
  labels:
    app: backend

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-sa
  namespace: subscriptio
  labels:
    app: analytics

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: subscriptio
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: subscriptio
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: subscriptio
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analytics-rolebinding
  namespace: subscriptio
subjects:
  - kind: ServiceAccount
    name: analytics-sa
    namespace: subscriptio
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
