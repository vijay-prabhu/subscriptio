apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: subscriptio-ingress
  namespace: subscriptio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  rules:
    - host: api.subscriptio.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 8081
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 8081
